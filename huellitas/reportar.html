<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reportar Mascota - Huellitas Yopal</title>
    <link rel="icon" type="image/png" href="imagenes/Logo.png">
    <link rel="stylesheet" href="estilos.css">
    <link rel="stylesheet" href="estilos-reportar.css">
</head>
<body>

  <header class="navbar">
        <a href="index.html" class="logo-link">
            <div class="logo">
                <img src="imagenes/Logo.png" alt="Logo" class="logo-icon" width="30" height="30">
                Huellitas a Casa 
            </div>
        </a>
        <button class="nav-toggle" id="nav-toggle" aria-label="Abrir menú" aria-expanded="false" onclick="alternarMenu()">
            <span></span><span></span><span></span>
        </button>
        <nav id="nav-menu">
            <a href="index.html">Inicio</a>
            <a href="index.html#mascotas-dinamicas-grid">Buscar Mascota</a>
           
            <a href="index.html#stories-section">Historias</a>
            <a href="index.html#seccion-mapa">Mapa</a>
            <a href="index.html#main-footer">Contacto</a>
            <a href="reportar.html" class="btn-report-lost">Reportar Mascota</a>
        </nav>
    </header>
    <main class="form-container-mock">
        <div class="form-box-mock">
            <h2>Crear Nuevo Reporte</h2>
            <p class="subtitle">Completa la información detallada para agilizar la búsqueda.</p>
            
            <form id="formulario-reporte" onsubmit="procesarReporte(event)" enctype="multipart/form-data">
                <div class="form-group-mock">
                    <label for="tipo-reporte">Tipo de Reporte *</label>
                    <select id="tipo-reporte" required>
                        <option value="">Seleccione una opción</option>
                        <option value="perdido">Perdí mi mascota 💜</option>
                        <option value="encontrado">Encontré una mascota 💚</option>
                    </select>
                </div>

                <div class="form-group-mock">
                    <label for="nombre">Nombre de la mascota (o "No aplica") *</label>
                    <input type="text" id="nombre" placeholder="Ej. Toby" required
                           minlength="2" maxlength="25"
                           pattern="^[a-zA-ZáéíóúÁÉÍÓÚñÑ\s]+$" 
                           title="El nombre solo debe contener letras.">
                </div>
                <div class="form-group-mock">
                    <label for="raza">Raza de la mascota *</label>
                    <input type="text" id="raza" placeholder="Ej. Criollo, Labrador, Siamés..." required
                           minlength="3" maxlength="20"
                           pattern="^[a-zA-ZáéíóúÁÉÍÓÚñÑ\s]+$"
                           title="La raza solo debe contener letras.">
                </div>

                <div class="form-group-mock">
                    <label for="color">Color(es) de la mascota *</label>
                    <input type="text" id="color" placeholder="Ej. Negro con blanco, Café atigrado..." required
                           minlength="3" maxlength="30"
                           pattern="^[a-zA-ZáéíóúÁÉÍÓÚñÑ\s/,-]+$"
                           title="Ingresa una descripción corta del color.">
                </div>
                <div class="form-group-mock">
                    <label for="imagen-archivo">Foto de la mascota *</label>
                    <input type="file" id="imagen-archivo" accept="image/png, image/jpeg, image/webp" required>
                    <p class="form-hint">Formatos permitidos: JPG, PNG o WEBP. Tamaño máximo 5 MB.</p>
                </div>

                <div class="form-group-mock">
                    <label for="zona-mapa">Barrio / Zona de Yopal *</label>
                    <select id="zona-mapa" required>
                        <option value="centro">Centro (Parque Principal)</option>
                        <option value="casimena">Barrio Casimena</option>
                        <option value="resurgimiento">Parque El Resurgimiento</option>
                        <option value="unicentro">Cerca al Unicentro</option>
                        <option value="sirivana">Vía Sirivana</option>
                        <option value="terminal">Terminal de Transporte</option>
                        <option value="aeropuerto">Zona Aeropuerto</option>
                        <option value="bicentenario">Parque Bicentenario</option>
                        <option value="hospital_materno">Sector Hospital Materno Infantil</option>
                        <option value="horo">Sector Hospital Regional (HORO)</option>
                        <option value="parque_intra">Parque Intra</option>
                        <option value="alkosto">Alkosto</option>
                        <option value="las_americas">Barrio Las Américas</option>
                        <option value="parque_hobos">Parque Los Hobos</option>
                        <option value="el_exito">El Éxito</option>
                        <option value="calle_40">Calle 40</option>
                        <option value="parque_herradura">Parque La Herradura</option>
                        <option value="museo_oriente">Museo Centro Histórico del Oriente</option>
                    </select>
                </div>

                <div class="form-group-mock">
                    <label for="telefono">Número de Celular de Contacto *</label>
                    <input type="tel" id="telefono" placeholder="Ej. 3123456789" required
                           minlength="10" maxlength="10"
                           pattern="^[0-9]{10}$"
                           title="Debe tener exactamente 10 números.">
                </div>

                <div class="form-group-mock">
                    <label for="correo">Correo Electrónico (para recibir tu PIN) *</label>
                    <input type="email" id="correo" placeholder="Ej. tucorreo@gmail.com" required
                           title="Ingresa un correo electrónico válido.">
                </div>

                <div class="form-group-mock">
                    <label for="detalles">Descripción o Rasgos Particulares *</label>
                    <textarea id="detalles" rows="3" placeholder="Ej. Tiene manchas blancas..." required
                              minlength="10" maxlength="200"></textarea>
                </div>

                

                <button type="submit" class="btn-enviar-mock">Publicar Reporte Exitosamente</button>
            </form>
        </div>
    </main>

    <script src="scripts.js"></script>
</body>
</html>
