<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reportar Mascota - Huellitas Yopal</title>
    <link rel="stylesheet" href="estilos.css">
    <style>
        /* Contenedor centralizado para que el formulario no se estire a los lados */
        .form-container-mock {
            max-width: 600px;
            margin: 40px auto;
            padding: 0 20px;
            font-family: system-ui, -apple-system, sans-serif;
        }
        .form-box-mock {
            background: white;
            padding: 35px;
            border-radius: 24px;
            border: 1px solid #e2e8f0;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }
        .form-box-mock h2 {
            font-size: 1.8rem;
            color: #1e293b;
            margin-bottom: 5px;
            font-weight: 700;
        }
        .form-box-mock .subtitle {
            color: #64748b;
            margin-bottom: 25px;
            font-size: 0.9rem;
        }
        .form-group-mock {
            margin-bottom: 20px;
            text-align: left;
        }
        .form-group-mock label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 0.9rem;
            color: #1e293b;
        }
        /* Ajuste estricto para que los inputs sean visibles y dejen escribir */
        .form-group-mock input, 
        .form-group-mock select, 
        .form-group-mock textarea {
            width: 100%;
            box-sizing: border-box; /* Evita que se desborden */
            padding: 12px 14px;
            border: 1px solid #cbd5e1;
            border-radius: 12px;
            font-size: 0.95rem;
            outline: none;
            background-color: #f8fafc;
            color: #334155;
            transition: all 0.2s;
        }
        .form-group-mock input:focus, 
        .form-group-mock select:focus, 
        .form-group-mock textarea:focus {
            border-color: #7f32d4; /* Tu morado principal */
            background-color: #ffffff;
            box-shadow: 0 0 0 3px rgba(127, 50, 212, 0.1);
        }
        /* Estilos del rectángulo del mapa integrado */
        .mapa-simulado-mock {
            position: relative;
            background-color: #b9e3de;
            height: 180px;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid rgba(0,0,0,0.05);
            margin-top: 5px;
        }
        .map-grid-lines {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: 
                linear-gradient(to right, rgba(255, 255, 255, 0.5) 2px, transparent 2px),
                linear-gradient(to bottom, rgba(255, 255, 255, 0.5) 2px, transparent 2px);
            background-size: 30px 30px;
        }
        .map-center-marker {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 1.5rem;
        }
        .map-overlay-text {
            position: absolute;
            bottom: 10px; left: 10px; right: 10px;
            background: rgba(255, 255, 255, 0.9);
            padding: 8px;
            border-radius: 8px;
            text-align: center;
            font-size: 0.8rem;
        }
        .map-overlay-text p { margin: 0; font-weight: bold; color: #1e293b; }
        /* Botón de envío */
        .btn-enviar-mock {
            width: 100%;
            padding: 14px;
            background-color: #7f32d4;
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 10px;
        }
        .btn-enviar-mock:hover {
            background-color: #6924b3;
        }
    </style>
</head>
<body>

  <header class="navbar">
        <a href="index.html" class="logo-link" style="text-decoration: none;">
            <div class="logo">
                <img src="imagenes/Logo.png" alt="Logo" style="width: 30px; height: 30px; object-fit: contain; vertical-align: middle; margin-right: 8px;">
                Huellitas a Casa 
            </div>
        </a>
        <nav>
            <a href="index.html">Inicio</a>
            <a href="index.html#mascotas-dinamicas-grid">Buscar Mascota</a>
           
            <a href="index.html#stories-section">Historias</a>
            <a href="index.html#seccion-mapa">Mapa</a>
            <a href="index.html#main-footer">Contacto</a>
            <a href="reportar.html" class="btn-report-lost" style="background-color: var(--purple-main); color: white;">Reportar Mascota</a>
        </nav>
    </header>
    <main class="form-container-mock">
        <div class="form-box-mock">
            <h2>Crear Nuevo Reporte</h2>
            <p class="subtitle">Completa la información detallada para agilizar la búsqueda.</p>
            
            <form id="formulario-reporte" onsubmit="procesarReporte(event)">
                <div class="form-group-mock">
                    <label for="tipo-reporte">Tipo de Reporte *</label>
                    <select id="tipo-reporte" required>
                        <option value="">Seleccione una opción</option>
                        <option value="perdido">Perdí mi mascota 💜</option>
                        <option value="encontrado">Encontré una mascota 💚</option>
                    </select>
                </div>

                <div class="form-group-mock">
                    <label for="nombre">Nombre de la mascota (o "No aplica") *</label>
                    <input type="text" id="nombre" placeholder="Ej. Toby" required
                           minlength="2" maxlength="25"
                           pattern="^[a-zA-ZáéíóúÁÉÍÓÚñÑ\s]+$" 
                           title="El nombre solo debe contener letras.">
                </div>
                <div class="form-group-mock">
                    <label for="raza">Raza de la mascota *</label>
                    <input type="text" id="raza" placeholder="Ej. Criollo, Labrador, Siamés..." required
                           minlength="3" maxlength="20"
                           pattern="^[a-zA-ZáéíóúÁÉÍÓÚñÑ\s]+$"
                           title="La raza solo debe contener letras.">
                </div>

                <div class="form-group-mock">
                    <label for="color">Color(es) de la mascota *</label>
                    <input type="text" id="color" placeholder="Ej. Negro con blanco, Café atigrado..." required
                           minlength="3" maxlength="30"
                           pattern="^[a-zA-ZáéíóúÁÉÍÓÚñÑ\s/,-]+$"
                           title="Ingresa una descripción corta del color.">
                </div>
                <div class="form-group-mock">
                    <label for="imagen-url">Enlace (URL) de la foto de la mascota *</label>
                    <input type="url" id="imagen-url" placeholder="Ej. https://sitio.com/foto.jpg" required
                             title="Por favor ingresa un enlace válido de una imagen.">
                </div>

                <div class="form-group-mock">
                    <label for="zona-mapa">Barrio / Zona de Yopal *</label>
                    <select id="zona-mapa" required>
                        <option value="centro">Centro</option>
                        <option value="casimena">Barrio Casimena</option>
                        <option value="resurgimiento">El Resurgimiento</option>
                        <option value="unicentro">Cerca al Unicentro</option>
                        <option value="sirivana">Vía Sirivana</option>
                    </select>
                </div>

                <div class="form-group-mock">
                    <label for="telefono">Número de Celular de Contacto *</label>
                    <input type="tel" id="telefono" placeholder="Ej. 3123456789" required
                           minlength="10" maxlength="10"
                           pattern="^[0-9]{10}$"
                           title="Debe tener exactamente 10 números.">
                </div>

                <div class="form-group-mock">
                    <label for="detalles">Descripción o Rasgos Particulares *</label>
                    <textarea id="detalles" rows="3" placeholder="Ej. Tiene manchas blancas..." required
                              minlength="10" maxlength="200"></textarea>
                </div>

                

                <button type="submit" class="btn-enviar-mock">Publicar Reporte Exitosamente</button>
            </form>
        </div>
    </main>

    <script src="scripts.js"></script>
</body>
</html>
